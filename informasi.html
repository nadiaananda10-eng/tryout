<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexora Academy - Informasi</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background-color: #fbd6e6; min-height: 100vh; }
        .navbar { background-color: #e56ba3; padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid #000000; }
        .logo-area { display: flex; align-items: center; gap: 12px; }
        .logo-img { width: 45px; height: 45px; object-fit: contain; }
        .logo-text { color: #ffffff; font-size: 1.4rem; font-weight: 700; letter-spacing: 1px; }
        .nav-menu { display: flex; gap: 20px; }
        .nav-btn { padding: 8px 35px; border: 2px solid #000000; border-radius: 20px; font-weight: 600; text-decoration: none; color: #000000; font-size: 0.95rem; box-shadow: 0 4px 0px #000000; transition: all 0.1s ease; }
        .nav-btn.white { background-color: #ffffff; }
        .nav-btn.active { background-color: #fca1d9; }
        .container { max-width: 1200px; margin: 40px auto; padding: 0 20px; }
        .info-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 30px; }
        .post-card { background-color: #fff1f5; border: 3px solid #000000; border-radius: 12px; box-shadow: 8px 8px 0px #000000; display: flex; flex-direction: column; overflow: hidden; text-decoration: none; color: #000000; transition: transform 0.1s ease, box-shadow 0.1s ease; }
        .post-card.has-link:active { transform: translate(4px, 4px); box-shadow: 4px 4px 0px #000000; }
        .post-header { padding: 12px 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid #000000; background-color: #fff1f5; }
        .avatar-dot { width: 22px; height: 22px; background-color: #ccff00; border: 2px solid #000000; border-radius: 50%; }
        .more-dots { font-size: 1.2rem; font-weight: 700; letter-spacing: 1px; }
        .post-body { width: 100%; aspect-ratio: 1 / 1; background-color: #fff1f5; position: relative; display: flex; justify-content: center; align-items: center; }
        .post-img { width: 100%; height: 100%; object-fit: cover; }
        .no-info-box { font-size: 1.1rem; font-weight: 700; color: #7a7a7a; text-align: center; padding: 20px; letter-spacing: 1px; text-transform: uppercase; }
        .post-footer { padding: 12px 15px; display: flex; justify-content: space-between; align-items: center; border-top: 3px solid #000000; background-color: #fff1f5; font-size: 1.3rem; }
        .footer-left { display: flex; gap: 15px; }
        .fa-heart { color: #ff4785; }
        .fa-comment { color: #ccff00; }
        .fa-paper-plane { color: #a182ff; }
        .fa-bookmark { color: #ccff00; }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo-area">
            <img src="logo.png" alt="Logo" class="logo-img" onerror="this.style.opacity='0'">
            <span class="logo-text">NEXORA ACADEMY</span>
        </div>
        <div class="nav-menu">
            <a href="halamansiswa.html" class="nav-btn white">Beranda</a>
            <a href="informasi.html" class="nav-btn active">Informasi</a>
            <a href="kontak.html" class="nav-btn white">Kontak</a>
        </div>
    </nav>
    <div class="container">
        <div class="info-grid" id="infoContainer"></div>
    </div>
    <script>
        const daftarInformasi = [
            { foto: "informasi1.png", link: "https://www.instagram.com/p/DahW6ZChFOj/?utm_source=ig_web_copy_link&igsh=MzRlODBiNWFlZA==" },
            { foto: "informasi2.png", link: "https://nexora.id/news" },
            { foto: "informasi3.png", link: "" },
            { foto: "informasi4.png", link: "" },
            { foto: "informasi5.png", link: "" },
            { foto: "informasi6.png", link: "" },
            { foto: "informasi7.png", link: "" },
            { foto: "informasi8.png", link: "" },
        ];
        const container = document.getElementById('infoContainer');
        daftarInformasi.forEach(info => {
            const card = document.createElement(info.link ? 'a' : 'div');
            card.className = `post-card ${info.link ? 'has-link' : ''}`;
            if(info.link) {
                card.href = info.link;
                card.target = "_blank";
            }
            let isiKonten = '';
            if (info.foto && info.foto.trim() !== "") {
                isiKonten = `<img src="${info.foto}" alt="Informasi" class="post-img" onerror="this.parentElement.innerHTML='<div class=\'no-info-box\'>TIDAK ADA INFORMASI</div>'">`;
            } else {
                isiKonten = `<div class="no-info-box">TIDAK ADA INFORMASI</div>`;
            }
            card.innerHTML = `
                <div class="post-header">
                    <div class="avatar-dot"></div>
                    <div class="more-dots">•••</div>
                </div>
                <div class="post-body">
                    ${isiKonten}
                </div>
                <div class="post-footer">
                    <div class="footer-left">
                        <i class="fa-solid fa-heart"></i>
                        <i class="fa-solid fa-comment"></i>
                        <i class="fa-solid fa-paper-plane"></i>
                    </div>
                    <div class="footer-right">
                        <i class="fa-solid fa-bookmark"></i>
                    </div>
                </div>
            `;
            container.appendChild(card);
        });
    </script>
</body>
</html>
