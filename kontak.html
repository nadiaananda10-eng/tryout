<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexora Academy - Kontak</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background-color: #fbd6e6; min-height: 100vh; display: flex; flex-direction: column; justify-content: space-between; }
        .navbar { background-color: #e56ba3; padding: 15px 4%; display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid #000000; flex-wrap: wrap; gap: 10px; }
        .logo-area { display: flex; align-items: center; gap: 12px; }
        .logo-img { width: 45px; height: 45px; object-fit: contain; }
        .logo-text { color: #ffffff; font-size: 1.4rem; font-weight: 700; letter-spacing: 1px; }
        .nav-menu { display: flex; gap: 8px; flex-wrap: wrap; justify-content: flex-end; }
        .nav-btn { padding: 8px 16px; border: 2px solid #000000; border-radius: 20px; font-weight: 600; text-decoration: none; color: #000000; font-size: 0.85rem; box-shadow: 0 4px 0px #000000; transition: all 0.1s; white-space: nowrap; }
        .nav-btn.white { background-color: #ffffff; }
        .nav-btn.active { background-color: #fca1d9; }
        .nav-btn:active { transform: translateY(2px); box-shadow: 0 2px 0px #000000; }
        .main-wrapper { max-width: 1200px; width: 100%; margin: auto; padding: 20px 3%; display: grid; grid-template-columns: 1fr; gap: 30px; align-items: center; }
        .form-grid-row { display: grid; grid-template-columns: 1fr; gap: 15px; margin-bottom: 15px; }
        .input-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 12px; }
        .input-group label { color: #8b7ca6; font-size: 0.95rem; font-weight: 600; }
        .form-control { width: 100%; background-color: #ffc2db; border: none; border-radius: 25px; padding: 12px 18px; font-size: 0.9rem; color: #000000; outline: none; }
        textarea.form-control { border-radius: 25px; resize: none; height: 140px; }
        .btn-submit { background-color: #ff76a9; color: #ffffff; border: none; border-radius: 25px; padding: 10px 30px; font-size: 0.95rem; font-weight: 600; cursor: pointer; transition: background 0.2s; }
        .btn-submit:hover { background-color: #e5568f; }
        .btn-submit:disabled { background-color: #cccccc; cursor: not-allowed; }
        .right-column { text-align: center; position: relative; }
        .headline { font-size: 2rem; font-weight: 700; color: #615286; margin-bottom: 20px; letter-spacing: -1px; }
        .plane-illustration { width: 100%; max-width: 300px; display: block; margin: 0 auto; }
        .footer-bar { background-color: #e56ba3; border-top: 3px solid #000000; padding: 12px 3%; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; font-size: 0.85rem; }
        .footer-item { display: flex; align-items: center; gap: 8px; color: #000000; font-weight: 600; }
        .footer-item i { font-size: 1.1rem; }
        .success-message { color: #10B981; font-weight: 600; margin-bottom: 12px; display: none; text-shadow: 1px 1px 0 #ddd; font-size: 0.9rem; }
        .error-message { color: #DC2626; font-weight: 600; margin-bottom: 12px; display: none; text-shadow: 1px 1px 0 #ddd; font-size: 0.9rem; }
        
        @media (min-width: 576px) {
            .navbar { padding: 15px 4%; }
            .nav-btn { padding: 8px 20px; font-size: 0.88rem; }
            .main-wrapper { padding: 30px 4%; gap: 40px; }
            .form-grid-row { grid-template-columns: 1fr 1fr; gap: 18px; margin-bottom: 18px; }
            .input-group { gap: 8px; margin-bottom: 15px; }
            .form-control { padding: 14px 20px; font-size: 0.95rem; }
            textarea.form-control { height: 160px; }
            .headline { font-size: 2.5rem; margin-bottom: 25px; }
            .footer-bar { padding: 12px 4%; gap: 15px; font-size: 0.9rem; }
            .footer-item i { font-size: 1.2rem; }
        }
        
        @media (min-width: 768px) {
            .navbar { padding: 15px 5%; gap: 15px; }
            .nav-btn { padding: 8px 28px; font-size: 0.9rem; }
            .main-wrapper { grid-template-columns: 1.2fr 1fr; padding: 40px 4%; gap: 60px; }
            .form-grid-row { grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
            .input-group { gap: 8px; margin-bottom: 20px; }
            .input-group label { font-size: 1.1rem; }
            .form-control { padding: 15px 25px; font-size: 1rem; }
            textarea.form-control { height: 180px; }
            .headline { font-size: 3.5rem; margin-bottom: 30px; }
            .plane-illustration { max-width: 420px; }
            .footer-bar { padding: 15px 5%; }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo-area">
            <img src="logo.png" alt="Logo" class="logo-img" onerror="this.style.opacity='0'">
            <span class="logo-text">NEXORA ACADEMY</span>
        </div>
        <div class="nav-menu">
            <a href="halamansiswa.html" class="nav-btn white">Beranda</a>
            <a href="informasi.html" class="nav-btn white">Informasi</a>
            <a href="kontak.html" class="nav-btn active">Kontak</a>
        </div>
    </nav>
    <main class="main-wrapper">
        <form id="contactForm" name="google-sheet-form">
            <div class="success-message" id="successMessage">✅ Pesan Anda berhasil dikirim!</div>
            <div class="error-message" id="errorMessage">❌ Gagal mengirim pesan, silahkan coba lagi.</div>
            
            <div class="form-grid-row">
                <div class="input-group">
                    <label for="firstName">Nama Depan</label>
                    <input type="text" id="firstName" name="Nama Depan" class="form-control" required>
                </div>
                <div class="input-group">
                    <label for="lastName">Nama Belakang</label>
                    <input type="text" id="lastName" name="Nama Belakang" class="form-control" required>
                </div>
            </div>
            <div class="input-group">
                <label for="emailAddress">Email</label>
                <input type="email" id="emailAddress" name="Email" class="form-control" required>
            </div>
            <div class="input-group">
                <label for="message">Pesan</label>
                <textarea id="message" name="Pesan" class="form-control" required></textarea>
            </div>
            <button type="submit" class="btn-submit" id="submitBtn">Submit</button>
        </form>
        <div class="right-column">
            <h1 class="headline">Hubungi Kami.</h1>
            <svg class="plane-illustration" viewBox="0 0 500 350" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M40 280 L180 200 M65 295 L205 215 M90 310 L210 240" stroke="#615286" stroke-width="4" stroke-dasharray="8 8" stroke-linecap="round"/>
                <path d="M220 220 L360 220 L270 250 Z" fill="#fff9b6" stroke="#615286" stroke-width="3"/>
                <path d="M220 220 L465 150 L270 250 Z" fill="#7be1d1" stroke="#615286" stroke-width="3"/>
                <path d="M320 178 L465 150 L220 220 Z" fill="#f5afc8" stroke="#615286" stroke-width="3"/>
            </svg>
        </div>
    </main>
    <footer class="footer-bar">
        <div class="footer-item"><i class="fa-regular fa-envelope"></i><span>nexoracademy31@gmail.com</span></div>
        <div class="footer-item"><i class="fa-brands fa-instagram"></i><span>nexoracademy_</span></div>
        <div class="footer-item"><i class="fa-solid fa-phone"></i><span>0881-0126-14584</span></div>
    </footer>
    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbwRVqpO_Ife-Xz9ibNTp0swUsn_8sOblsBh8GjfiVMXze7-oh0ZHhZhTMnrMadIxZ0O/exec';
        const form = document.forms['google-sheet-form'];
        const btnSubmit = document.getElementById('submitBtn');
        const successMsg = document.getElementById('successMessage');
        const errorMsg = document.getElementById('errorMessage');

        form.addEventListener('submit', e => {
            e.preventDefault();
            successMsg.style.display = 'none';
            errorMsg.style.display = 'none';
            btnSubmit.disabled = true;
            btnSubmit.innerHTML = "Mengirim...";
            
            fetch(scriptURL, { method: 'POST', body: new FormData(form), mode: 'no-cors'})
            .then(response => {
                btnSubmit.disabled = false;
                btnSubmit.innerHTML = "Submit";
                successMsg.style.display = 'block';
                form.reset();
                setTimeout(() => { successMsg.style.display = 'none'; }, 3000);
            })
            .catch(error => {
                btnSubmit.disabled = false;
                btnSubmit.innerHTML = "Submit";
                errorMsg.style.display = 'block';
                console.error('Error!', error.message);
                setTimeout(() => { errorMsg.style.display = 'none'; }, 3000);
            });
        });
    </script>
</body>
</html>
